services:
  - type: web
    name: huawei-ict-platform
    env: java
    region: oregon  # 可选：virginia, oregon, frankfurt, singapore
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/ict-platform-1.0.0.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_OPTS
        value: "-Xmx300m -Xss512k -XX:CICompilerCount=2"
