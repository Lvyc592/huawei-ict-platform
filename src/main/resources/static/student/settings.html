<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人设置 - 华技云学生端</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="main-layout">
    <aside class="sidebar">
        <div class="sidebar-header"><h1><i class="bi bi-cloud-fill"></i>华技云</h1></div>
        <nav class="sidebar-menu">
            <div class="menu-section">主要功能</div>
            <a href="dashboard.html" class="menu-item"><i class="bi bi-house-door"></i>工作台</a>
            <a href="courses.html" class="menu-item"><i class="bi bi-book"></i>课程学习</a>
            <a href="practice.html" class="menu-item"><i class="bi bi-journal-check"></i>题库练习</a>
            <a href="mock-exams.html" class="menu-item"><i class="bi bi-clock-history"></i>模拟考试</a>
            <a href="cloud-lab.html" class="menu-item"><i class="bi bi-cloud-haze"></i>华为云实训</a>
            <a href="ai-tutor.html" class="menu-item"><i class="bi bi-robot"></i>助学智能体</a>
            <div class="menu-section">扩展功能</div>
            <a href="competitions.html" class="menu-item"><i class="bi bi-trophy"></i>赛事训练</a>
            <a href="jobs.html" class="menu-item"><i class="bi bi-briefcase"></i>就业岗位</a>
            <a href="analytics.html" class="menu-item"><i class="bi bi-bar-chart"></i>学情数据</a>
            <a href="settings.html" class="menu-item active"><i class="bi bi-gear"></i>个人设置</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">学</div>
                <div class="user-details"><div class="user-name">学生用户</div><div class="user-role">华为ICT学员</div></div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div class="header-left">
                <div class="header-nav">
                    <a href="dashboard.html">首页</a>
                    <a href="courses.html">课程学习</a>
                    <a href="practice.html">题库练习</a>
                    <a href="mock-exams.html">模拟考试</a>
                    <a href="cloud-lab.html">云端实训</a>
                    <a href="competitions.html">赛事中心</a>
                    </div>
            </div>
            <div class="header-right">
                <div class="header-icon" title="消息"><i class="bi bi-bell"></i><span class="badge"></span></div>
                <a href="../index.html" class="btn btn-sm btn-outline" style="text-decoration:none;"><i class="bi bi-box-arrow-right"></i> 退出</a>
            </div>
        </header>

        <div class="page-content">
            <div class="page-title"><h2><i class="bi bi-gear me-2"></i>个人设置</h2><p>管理个人信息和账户设置</p></div>

            <div class="row-2">
                <!-- 个人信息 -->
                <div class="card">
                    <div class="card-header"><h3>个人信息</h3></div>
                    <div class="card-body">
                        <div style="text-align:center;margin-bottom:24px;">
                            <div style="width:80px;height:80px;border-radius:50%;background:#094086;display:flex;align-items:center;justify-content:center;color:white;font-size:28px;margin:0 auto 12px;">学</div>
                            <button class="btn btn-sm btn-outline" onclick="showToast('头像更换功能开发中，敬请期待','info')">更换头像</button>
                        </div>
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" value="学生用户" style="width:100%;padding:10px 14px;border:1px solid #e5e7eb;border-radius:6px;font-size:14px;">
                        </div>
                        <div class="form-group">
                            <label>学号</label>
                            <input type="text" value="ICT2024001" disabled style="width:100%;padding:10px 14px;border:1px solid #e5e7eb;border-radius:6px;font-size:14px;background:#f5f7fa;">
                        </div>
                        <div class="form-group">
                            <label>邮箱</label>
                            <input type="email" placeholder="请输入邮箱" style="width:100%;padding:10px 14px;border:1px solid #e5e7eb;border-radius:6px;font-size:14px;">
                        </div>
                        <div class="form-group">
                            <label>手机号</label>
                            <input type="tel" placeholder="请输入手机号" style="width:100%;padding:10px 14px;border:1px solid #e5e7eb;border-radius:6px;font-size:14px;">
                        </div>
                        <button class="btn btn-primary w-100" onclick="showToast('个人信息已保存成功！','success')">保存修改</button>
                    </div>
                </div>

                <!-- 安全设置 -->
                <div>
                    <div class="card mb-4">
                        <div class="card-header"><h3>安全设置</h3></div>
                        <div class="card-body" style="display:flex;flex-direction:column;gap:16px;">
                            <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:16px;border-bottom:1px solid #e5e7eb;">
                                <div>
                                    <h4 style="font-size:14px;margin-bottom:4px;">登录密码</h4>
                                    <p style="font-size:12px;color:#999;margin:0;">建议定期更换密码以保护账户安全</p>
                                </div>
                                <button class="btn btn-sm btn-outline" onclick="showToast('密码修改功能开发中','info')">修改密码</button>
                            </div>
                            <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:16px;border-bottom:1px solid #e5e7eb;">
                                <div>
                                    <h4 style="font-size:14px;margin-bottom:4px;">绑定邮箱</h4>
                                    <p style="font-size:12px;color:#999;margin:0;">未绑定邮箱</p>
                                </div>
                                <button class="btn btn-sm btn-outline" onclick="showToast('邮箱绑定功能开发中','info')">立即绑定</button>
                            </div>
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <div>
                                    <h4 style="font-size:14px;margin-bottom:4px;">登录设备管理</h4>
                                    <p style="font-size:12px;color:#999;margin:0;">当前已登录 2 台设备</p>
                                </div>
                                <button class="btn btn-sm btn-outline" onclick="showToast('当前已登录2台设备：PC浏览器、移动端','info')">查看详情</button>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header"><h3>通知设置</h3></div>
                        <div class="card-body" style="display:flex;flex-direction:column;gap:16px;">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <div>
                                    <h4 style="font-size:14px;margin-bottom:4px;">课程更新通知</h4>
                                    <p style="font-size:12px;color:#999;margin:0;">新课上线时通知我</p>
                                </div>
                                <label style="position:relative;display:inline-block;width:44px;height:24px;">
                                    <input type="checkbox" checked style="opacity:0;width:0;height:0;">
                                    <span style="position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#094086;border-radius:12px;transition:.3s;"></span>
                                </label>
                            </div>
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <div>
                                    <h4 style="font-size:14px;margin-bottom:4px;">考试提醒</h4>
                                    <p style="font-size:12px;color:#999;margin:0;">模拟考试开放时通知我</p>
                                </div>
                                <label style="position:relative;display:inline-block;width:44px;height:24px;">
                                    <input type="checkbox" checked style="opacity:0;width:0;height:0;">
                                    <span style="position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#094086;border-radius:12px;transition:.3s;"></span>
                                </label>
                            </div>
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <div>
                                    <h4 style="font-size:14px;margin-bottom:4px;">就业推荐</h4>
                                    <p style="font-size:12px;color:#999;margin:0;">新岗位发布时通知我</p>
                                </div>
                                <label style="position:relative;display:inline-block;width:44px;height:24px;">
                                    <input type="checkbox" style="opacity:0;width:0;height:0;">
                                    <span style="position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:12px;transition:.3s;"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/common.js"></script>
</body>
</html>
