<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的课程 - 华技云教师端</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .sidebar-header.teacher { background: linear-gradient(135deg, #064e3b, #059669); }
        .menu-item.active { background: #f0fdf4; color: #059669; border-left: 3px solid #059669; }
        .menu-item:hover { background: #f0fdf4; color: #059669; }
        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .course-card { background: #fff; border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; transition: all .2s; cursor: pointer; }
        .course-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .course-svg { width: 100%; height: 140px; display: block; }
        .course-body { padding: 16px; }
        .course-title { font-size: 15px; font-weight: 600; color: #064e3b; margin-bottom: 8px; }
        .course-meta { display: flex; gap: 12px; font-size: 12px; color: #6b7280; margin-bottom: 10px; }
        .course-meta span i { margin-right: 3px; }
        .course-stats { display: flex; justify-content: space-between; padding: 10px 16px; background: #f0fdf4; font-size: 12px; }
        .course-stats > div { text-align: center; flex: 1; }
        .course-stats strong { display: block; color: #047857; font-size: 18px; }
        .course-modal-mask { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 9999; align-items: center; justify-content: center; }
        .course-modal-mask.show { display: flex; }
        .course-modal { background: #fff; border-radius: 12px; width: 80%; max-width: 900px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header-bar { padding: 16px 20px; background: linear-gradient(135deg, #064e3b, #059669); color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .modal-header-bar h3 { color: #fff; margin: 0; }
        .modal-close { background: transparent; border: 1px solid rgba(255,255,255,0.4); color: #fff; border-radius: 4px; padding: 4px 12px; cursor: pointer; }
        .modal-body-content { padding: 20px; overflow: auto; flex: 1; }
        .student-table { width: 100%; border-collapse: collapse; }
        .student-table th, .student-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .student-table th { background: #f0fdf4; color: #047857; font-weight: 600; }
    </style>
</head>
<body>
<div class="main-layout">
    <aside class="sidebar">
        <div class="sidebar-header teacher"><h1><i class="bi bi-person-workspace"></i>教师端</h1></div>
        <nav class="sidebar-menu">
            <div class="menu-section">教学工作台</div>
            <a href="dashboard.html" class="menu-item"><i class="bi bi-speedometer2"></i>教学仪表盘</a>
            <a href="courses.html" class="menu-item active"><i class="bi bi-book"></i>我的课程</a>
            <a href="students.html" class="menu-item"><i class="bi bi-people"></i>学员管理</a>
            <a href="exam-records.html" class="menu-item"><i class="bi bi-journal-check"></i>考试记录</a>
            <a href="analytics.html" class="menu-item"><i class="bi bi-graph-up"></i>学情分析</a>
            <div class="menu-section">个人</div>
            <a href="../index.html" class="menu-item"><i class="bi bi-box-arrow-right"></i>退出登录</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" style="background:#059669;">师</div>
                <div class="user-details"><div class="user-name">教师用户</div><div class="user-role">华技云讲师</div></div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div class="header-left">
                <div class="header-nav">
                    <a href="dashboard.html">工作台</a>
                    <a href="courses.html" class="active">我的课程</a>
                    <a href="students.html">学员管理</a>
                    <a href="exam-records.html">考试记录</a>
                    <a href="analytics.html">学情分析</a>
                </div>
            </div>
            <div class="header-right">
                <a href="../index.html" class="btn btn-sm btn-outline" style="text-decoration:none;"><i class="bi bi-box-arrow-right"></i> 退出</a>
            </div>
        </header>

        <div class="page-content">
            <div class="page-title"><h2><i class="bi bi-book me-2"></i>我的课程</h2><p>查看您所教授的课程、章节与报名学员</p></div>

            <div class="card mb-3">
                <div class="card-body" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
                    <div style="display:flex;gap:8px;align-items:center;">
                        <i class="bi bi-funnel" style="color:#6b7280;"></i>
                        <select class="form-select form-select-sm" id="filterCategory" style="width:auto;">
                            <option value="">全部方向</option>
                            <option value="HCIA">HCIA</option>
                            <option value="HCIP">HCIP</option>
                            <option value="HCIE">HCIE</option>
                            <option value="Cloud">云计算</option>
                            <option value="BigData">大数据</option>
                            <option value="AI">人工智能</option>
                        </select>
                        <select class="form-select form-select-sm" id="filterStatus" style="width:auto;">
                            <option value="">全部状态</option>
                            <option value="PUBLISHED">已上线</option>
                            <option value="PENDING">待审核</option>
                            <option value="DRAFT">草稿</option>
                        </select>
                    </div>
                    <div style="color:#6b7280;font-size:13px;">共 <strong id="totalCount">--</strong> 门课程</div>
                </div>
            </div>

            <div class="course-grid" id="courseGrid">
                <div style="grid-column:1/-1;text-align:center;color:#999;padding:40px;">加载中…</div>
            </div>
        </div>
    </main>
</div>

<!-- 学员列表模态框 -->
<div class="course-modal-mask" id="studentsModal">
    <div class="course-modal">
        <div class="modal-header-bar">
            <h3><i class="bi bi-people me-2"></i><span id="modalTitle">课程学员</span></h3>
            <button class="modal-close" onclick="closeModal()">关闭</button>
        </div>
        <div class="modal-body-content" id="modalBody">
            <div style="text-align:center;color:#999;padding:30px;">加载中…</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/common.js"></script>
<script>
var allCourses = [];
var categoryGradient = {
    HCIA:    ['#3b82f6', '#1e3a8a'],
    HCIP:    ['#7c3aed', '#4c1d95'],
    HCIE:    ['#dc2626', '#581616'],
    Cloud:   ['#06b6d4', '#0e7490'],
    BigData: ['#10b981', '#065f46'],
    AI:      ['#f59e0b', '#92400e']
};
var catLabel = { HCIA:'HCIA', HCIP:'HCIP', HCIE:'HCIE', Cloud:'Cloud', BigData:'BigData', AI:'AI' };

function renderCard(c) {
    var g = categoryGradient[c.category] || categoryGradient.HCIA;
    var id = 'svg_' + c.id;
    var statusMap = { PUBLISHED: '已上线', PENDING: '待审核', DRAFT: '草稿' };
    var tagClass = { PUBLISHED: 'tag-success', PENDING: 'tag-warning', DRAFT: 'tag-info' };
    var tag = '<span class="tag ' + (tagClass[c.status]||'tag-info') + '">' + (statusMap[c.status]||c.status) + '</span>';
    var svg = '<svg class="course-svg" viewBox="0 0 400 140" preserveAspectRatio="xMidYMid slice">' +
        '<defs><linearGradient id="' + id + '" x1="0%" y1="0%" x2="100%" y2="100%">' +
        '<stop offset="0%" stop-color="' + g[0] + '"/><stop offset="100%" stop-color="' + g[1] + '"/>' +
        '</linearGradient></defs>' +
        '<rect width="400" height="140" fill="url(#' + id + ')"/>' +
        '<text x="200" y="68" text-anchor="middle" fill="white" font-size="26" font-weight="bold" font-family="Arial">' + (catLabel[c.category]||c.category||'') + '</text>' +
        '<text x="200" y="100" text-anchor="middle" fill="white" opacity="0.85" font-size="14" font-family="Microsoft YaHei">' + (c.name||'').replace(/[Hh][Cc][Ii][A-C]/g, '').trim().slice(0, 16) + '</text>' +
        '</svg>';
    return '<div class="course-card" onclick="openStudents(' + c.id + ', \'' + (c.name||'').replace(/'/g, "\\'") + '\')">' +
        svg +
        '<div class="course-body">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">' +
        '<div class="course-title">' + (c.name||'') + '</div>' + tag +
        '</div>' +
        '<div class="course-meta">' +
        '<span><i class="bi bi-tag-fill"></i>' + (c.category||'-') + '</span>' +
        '<span><i class="bi bi-clock"></i>' + (c.totalHours||0) + '学时</span>' +
        '<span><i class="bi bi-list-ol"></i>' + (c.totalChapters||0) + '章</span>' +
        '</div>' +
        '<div style="font-size:12px;color:#6b7280;line-height:1.6;height:38px;overflow:hidden;">' + (c.description||'暂无简介') + '</div>' +
        '</div>' +
        '<div class="course-stats">' +
        '<div><strong id="cs_' + c.id + '">--</strong><span style="color:#6b7280;">报名学员</span></div>' +
        '<div><strong id="ip_' + c.id + '">--</strong><span style="color:#6b7280;">进行中</span></div>' +
        '<div><strong id="co_' + c.id + '">--</strong><span style="color:#6b7280;">已完成</span></div>' +
        '</div>' +
        '</div>';
}

async function loadCourses() {
    const r = await apiRequest('/teacher/my-courses');
    if (!r || !r.success) { document.getElementById('courseGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#dc3545;padding:40px;">加载失败</div>'; return; }
    allCourses = r.data || [];
    document.getElementById('totalCount').textContent = allCourses.length;
    applyFilter();
    // 拉每门课的报名数（用 course-students 接口 count 出来）
    allCourses.forEach(async function(c) {
        try {
            const r2 = await apiRequest('/teacher/courses/' + c.id + '/students');
            if (r2 && r2.success) {
                var list = r2.data || [];
                var ip = list.filter(function(s){return s.status==='IN_PROGRESS';}).length;
                var co = list.filter(function(s){return s.status==='COMPLETED';}).length;
                var el1 = document.getElementById('cs_' + c.id);
                var el2 = document.getElementById('ip_' + c.id);
                var el3 = document.getElementById('co_' + c.id);
                if (el1) el1.textContent = list.length;
                if (el2) el2.textContent = ip;
                if (el3) el3.textContent = co;
            }
        } catch(e) {}
    });
}

function applyFilter() {
    var cat = document.getElementById('filterCategory').value;
    var st = document.getElementById('filterStatus').value;
    var list = allCourses.filter(function(c) {
        if (cat && c.category !== cat) return false;
        if (st && c.status !== st) return false;
        return true;
    });
    var grid = document.getElementById('courseGrid');
    if (list.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#999;padding:40px;">暂无符合条件的课程</div>';
        return;
    }
    grid.innerHTML = list.map(renderCard).join('');
}

async function openStudents(courseId, courseName) {
    document.getElementById('modalTitle').textContent = courseName + ' - 学员列表';
    document.getElementById('modalBody').innerHTML = '<div style="text-align:center;color:#999;padding:30px;">加载中…</div>';
    document.getElementById('studentsModal').classList.add('show');
    try {
        const r = await apiRequest('/teacher/courses/' + courseId + '/students');
        if (!r || !r.success) { document.getElementById('modalBody').innerHTML = '<div style="text-align:center;color:#dc3545;padding:30px;">加载失败: ' + (r && r.message) + '</div>'; return; }
        var list = r.data || [];
        if (list.length === 0) {
            document.getElementById('modalBody').innerHTML = '<div style="text-align:center;color:#999;padding:30px;">该课程暂无学员报名</div>';
            return;
        }
        // 统计概览
        var ip = list.filter(function(s){return s.status==='IN_PROGRESS';}).length;
        var co = list.filter(function(s){return s.status==='COMPLETED';}).length;
        var nb = list.filter(function(s){return s.status==='NOT_STARTED';}).length;
        var html = '<div style="display:flex;gap:10px;margin-bottom:16px;">' +
            '<div class="badge bg-light text-dark" style="padding:8px 12px;font-size:13px;">📊 共 ' + list.length + ' 人</div>' +
            '<div class="badge bg-warning text-dark" style="padding:8px 12px;font-size:13px;">进行中 ' + ip + '</div>' +
            '<div class="badge bg-success" style="padding:8px 12px;font-size:13px;">已完成 ' + co + '</div>' +
            '<div class="badge bg-secondary" style="padding:8px 12px;font-size:13px;">未开始 ' + nb + '</div>' +
            '</div>';
        html += '<table class="student-table">' +
            '<thead><tr><th>学员</th><th>学号</th><th>进度</th><th>状态</th><th>报名时间</th></tr></thead><tbody>';
        list.forEach(function(s) {
            var statusMap = { IN_PROGRESS: '<span class="tag tag-warning">进行中</span>', COMPLETED: '<span class="tag tag-success">已完成</span>', NOT_STARTED: '<span class="tag tag-info">未开始</span>' };
            html += '<tr>' +
                '<td><div style="display:flex;align-items:center;gap:8px;"><div style="width:28px;height:28px;border-radius:50%;background:#d1fae5;color:#047857;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;">' + (s.name||s.username||'学').charAt(0) + '</div><span>' + (s.name||s.username) + '</span></div></td>' +
                '<td>' + (s.studentId||'-') + '</td>' +
                '<td><div style="display:flex;align-items:center;gap:6px;"><div style="flex:1;height:6px;background:#ecfdf5;border-radius:3px;overflow:hidden;max-width:120px;"><div style="height:100%;background:linear-gradient(90deg,#10b981,#059669);width:' + (s.progress||0) + '%;"></div></div><span style="font-size:12px;color:#047857;font-weight:600;">' + (s.progress||0) + '%</span></div></td>' +
                '<td>' + (statusMap[s.status]||s.status) + '</td>' +
                '<td style="color:#6b7280;">' + ((s.enrolledAt||'').substring(0,10)||'-') + '</td>' +
                '</tr>';
        });
        html += '</tbody></table>';
        document.getElementById('modalBody').innerHTML = html;
    } catch(e) {
        document.getElementById('modalBody').innerHTML = '<div style="text-align:center;color:#dc3545;padding:30px;">加载失败</div>';
    }
}

function closeModal() { document.getElementById('studentsModal').classList.remove('show'); }

document.addEventListener('DOMContentLoaded', function() {
    loadCourses();
    document.getElementById('filterCategory').addEventListener('change', applyFilter);
    document.getElementById('filterStatus').addEventListener('change', applyFilter);
    document.getElementById('studentsModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
});
</script>
</body>
</html>
