<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学员管理 - 华技云教师端</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .sidebar-header.teacher { background: linear-gradient(135deg, #064e3b, #059669); }
        .menu-item.active { background: #f0fdf4; color: #059669; border-left: 3px solid #059669; }
        .menu-item:hover { background: #f0fdf4; color: #059669; }
        .student-card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; transition: all .2s; }
        .student-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
        .student-head { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
        .student-avatar-lg { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #10b981, #059669); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; flex-shrink: 0; }
        .progress-bar-bg { height: 6px; background: #ecfdf5; border-radius: 3px; overflow: hidden; }
        .progress-bar-bg > div { height: 100%; background: linear-gradient(90deg, #10b981, #059669); border-radius: 3px; }
        .active-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
        .active-dot.green { background: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
        .active-dot.gray { background: #d1d5db; }
        .course-chip { display: inline-block; padding: 3px 8px; background: #f0fdf4; color: #047857; border-radius: 4px; font-size: 12px; margin: 2px; }
        .stat-mini { display: flex; gap: 16px; padding: 10px 16px; background: #f0fdf4; border-radius: 8px; margin-bottom: 16px; }
        .stat-mini > div { flex: 1; text-align: center; }
        .stat-mini strong { display: block; font-size: 22px; color: #047857; }
        .stat-mini span { font-size: 12px; color: #6b7280; }
    </style>
</head>
<body>
<div class="main-layout">
    <aside class="sidebar">
        <div class="sidebar-header teacher"><h1><i class="bi bi-person-workspace"></i>教师端</h1></div>
        <nav class="sidebar-menu">
            <div class="menu-section">教学工作台</div>
            <a href="dashboard.html" class="menu-item"><i class="bi bi-speedometer2"></i>教学仪表盘</a>
            <a href="courses.html" class="menu-item"><i class="bi bi-book"></i>我的课程</a>
            <a href="students.html" class="menu-item active"><i class="bi bi-people"></i>学员管理</a>
            <a href="exam-records.html" class="menu-item"><i class="bi bi-journal-check"></i>考试记录</a>
            <a href="analytics.html" class="menu-item"><i class="bi bi-graph-up"></i>学情分析</a>
            <div class="menu-section">个人</div>
            <a href="../index.html" class="menu-item"><i class="bi bi-box-arrow-right"></i>退出登录</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" style="background:#059669;">师</div>
                <div class="user-details"><div class="user-name">教师用户</div><div class="user-role">华技云讲师</div></div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div class="header-left">
                <div class="header-nav">
                    <a href="dashboard.html">工作台</a>
                    <a href="courses.html">我的课程</a>
                    <a href="students.html" class="active">学员管理</a>
                    <a href="exam-records.html">考试记录</a>
                    <a href="analytics.html">学情分析</a>
                </div>
            </div>
            <div class="header-right">
                <a href="../index.html" class="btn btn-sm btn-outline" style="text-decoration:none;"><i class="bi bi-box-arrow-right"></i> 退出</a>
            </div>
        </header>

        <div class="page-content">
            <div class="page-title"><h2><i class="bi bi-people me-2"></i>学员管理</h2><p>查看您所教课程下的所有学员学习情况</p></div>

            <!-- 概览统计 -->
            <div class="stat-mini" id="miniStats">
                <div><strong id="msTotal">--</strong><span>学员总数</span></div>
                <div><strong id="msActive">--</strong><span>7天内活跃</span></div>
                <div><strong id="msAvgProgress">--%</strong><span>平均进度</span></div>
                <div><strong id="msAvgMastery">--%</strong><span>平均掌握度</span></div>
            </div>

            <!-- 搜索栏 -->
            <div class="card mb-3">
                <div class="card-body" style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                    <div style="position:relative;flex:1;min-width:240px;">
                        <i class="bi bi-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#6b7280;"></i>
                        <input type="text" class="form-control" id="searchInput" placeholder="搜索学员姓名 / 学号" style="padding-left:32px;">
                    </div>
                    <select class="form-select" id="filterActive" style="width:auto;">
                        <option value="">全部学员</option>
                        <option value="active">7天内活跃</option>
                        <option value="inactive">7天未活跃</option>
                    </select>
                    <select class="form-select" id="sortBy" style="width:auto;">
                        <option value="default">默认排序</option>
                        <option value="mastery">掌握度低→高</option>
                        <option value="progress">进度低→高</option>
                    </select>
                </div>
            </div>

            <div id="studentList">
                <div style="text-align:center;color:#999;padding:40px;">加载中…</div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/common.js"></script>
<script>
var allStudents = [];

function statusTag(p) {
    if (p >= 100) return '<span class="tag tag-success">已完成</span>';
    if (p > 0) return '<span class="tag tag-warning">进行中</span>';
    return '<span class="tag tag-info">未开始</span>';
}

function renderCard(s) {
    var initial = (s.name || s.username || '学').charAt(0);
    var activeTag = s.active7d
        ? '<span><i class="active-dot green"></i>7天内活跃</span>'
        : '<span><i class="active-dot gray"></i>未活跃</span>';
    var courseChips = (s.courses || []).map(function(c) {
        return '<span class="course-chip" title="进度 ' + (c.progress||0) + '%">' + (c.courseName||'') + ' · ' + (c.progress||0) + '%</span>';
    }).join('') || '<span style="color:#999;font-size:12px;">未报名课程</span>';
    return '<div class="student-card">' +
        '<div class="student-head">' +
        '<div class="student-avatar-lg">' + initial + '</div>' +
        '<div style="flex:1;">' +
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">' +
        '<div style="font-size:15px;font-weight:600;color:#064e3b;">' + (s.name||s.username) + '</div>' +
        activeTag +
        '</div>' +
        '<div style="font-size:12px;color:#6b7280;">' + (s.studentId||'') + ' · ' + (s.username||'') + '</div>' +
        '</div>' +
        '<div style="text-align:right;">' +
        '<div style="font-size:13px;color:#6b7280;">平均掌握度</div>' +
        '<div style="font-size:22px;font-weight:600;color:' + ((s.mastery||0) >= 60 ? '#059669' : (s.mastery||0) >= 40 ? '#f59e0b' : '#dc3545') + ';">' + (s.mastery||0) + '%</div>' +
        '</div>' +
        '</div>' +
        '<div style="margin-bottom:8px;">' +
        '<div style="display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:4px;">' +
        '<span>平均进度 · ' + (s.courseCount||0) + ' 门课</span>' +
        '<span style="font-weight:600;color:#047857;">' + (s.avgProgress||0) + '%</span>' +
        '</div>' +
        '<div class="progress-bar-bg"><div style="width:' + (s.avgProgress||0) + '%;"></div></div>' +
        '</div>' +
        '<div style="margin-top:10px;">' + courseChips + '</div>' +
        '</div>';
}

async function loadStudents() {
    const r = await apiRequest('/teacher/my-students');
    if (!r || !r.success) { document.getElementById('studentList').innerHTML = '<div style="text-align:center;color:#dc3545;padding:40px;">加载失败</div>'; return; }
    allStudents = r.data || [];
    // 概览
    var active = allStudents.filter(function(s){return s.active7d;}).length;
    var avgProgress = allStudents.length > 0 ? Math.round(allStudents.reduce(function(sum,s){return sum+(s.avgProgress||0);}, 0) / allStudents.length) : 0;
    var avgMastery = allStudents.length > 0 ? Math.round(allStudents.reduce(function(sum,s){return sum+(s.mastery||0);}, 0) / allStudents.length) : 0;
    document.getElementById('msTotal').textContent = allStudents.length;
    document.getElementById('msActive').textContent = active;
    document.getElementById('msAvgProgress').textContent = avgProgress + '%';
    document.getElementById('msAvgMastery').textContent = avgMastery + '%';
    applyFilter();
}

function applyFilter() {
    var kw = document.getElementById('searchInput').value.trim().toLowerCase();
    var act = document.getElementById('filterActive').value;
    var sort = document.getElementById('sortBy').value;
    var list = allStudents.slice();
    if (kw) {
        list = list.filter(function(s) {
            return (s.name||'').toLowerCase().indexOf(kw) >= 0
                || (s.studentId||'').toLowerCase().indexOf(kw) >= 0
                || (s.username||'').toLowerCase().indexOf(kw) >= 0;
        });
    }
    if (act === 'active') list = list.filter(function(s){return s.active7d;});
    if (act === 'inactive') list = list.filter(function(s){return !s.active7d;});
    if (sort === 'mastery') list.sort(function(a,b){return (a.mastery||0) - (b.mastery||0);});
    if (sort === 'progress') list.sort(function(a,b){return (a.avgProgress||0) - (b.avgProgress||0);});
    var html = '';
    if (list.length === 0) {
        html = '<div style="text-align:center;color:#999;padding:40px;">暂无符合条件的学员</div>';
    } else {
        html = list.map(renderCard).join('');
    }
    document.getElementById('studentList').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function() {
    loadStudents();
    document.getElementById('searchInput').addEventListener('input', applyFilter);
    document.getElementById('filterActive').addEventListener('change', applyFilter);
    document.getElementById('sortBy').addEventListener('change', applyFilter);
});
</script>
</body>
</html>
