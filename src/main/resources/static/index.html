<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华技云 - 华为ICT智慧实训平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-page" id="loginPage">
        <div class="login-container">
            <div class="login-card">
                <!-- Logo区域 -->
                <div class="login-logo">
                    <img src="https://img.alicdn.com/imgextra/i4/O1CN01wRZIXm1wR2nXZBxVp_!!6000000006308-2.png" alt="华为ICT学院" style="width:80px;height:80px;border-radius:12px;">
                    <h2>华技云 ICT智慧实训平台</h2>
                    <p>领先级华为ICT学院 · 岗课赛证一体化实训平台</p>
                </div>

                <!-- 提示文案：统一一个登录入口，根据账号自动识别身份 -->
                <div class="login-hint" style="text-align:center; color:#64748b; font-size:14px; margin-bottom:18px;">
                    <i class="bi bi-shield-check me-1" style="color:#2563eb;"></i>
                    系统将根据账号自动识别学生 / 教师 / 管理员身份
                </div>

                <!-- 登录表单 -->
                <form id="loginForm" onsubmit="return false">
                    <div class="form-group">
                        <label>账号</label>
                        <div class="input-wrapper">
                            <i class="bi bi-person"></i>
                            <input type="text" id="username" placeholder="请输入账号" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <div class="input-wrapper">
                            <i class="bi bi-lock"></i>
                            <input type="password" id="password" placeholder="请输入密码" required>
                        </div>
                    </div>

                    <div class="login-options">
                        <label>
                            <input type="checkbox" id="remember"> 记住账号
                        </label>
                        <a href="javascript:void(0)">忘记密码？</a>
                    </div>

                    <button type="button" class="btn-login" onclick="doLogin()">
                        <i class="bi bi-box-arrow-in-right me-2"></i>登 录
                    </button>
                </form>

                <!-- 提示信息 -->
                <div id="loginMsg" class="alert mt-3" style="display:none;padding:10px 16px;border-radius:6px;font-size:13px;"></div>

                <div class="login-footer">
                    <p>技术支持：领先级华为ICT学院 | 博赛数字科技联合共建</p>
                    <p class="mt-1">© 2024 华技云平台 v2.0</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
